name: Build and Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: 'What to publish'
        required: true
        default: 'all'
        type: choice
        options:
          - all
      tag:
        description: 'npm tag (latest, next, beta, alpha)'
        required: false
        default: 'latest'
        type: string
      dry-run:
        description: 'Dry run (no actual publish)'
        required: false
        default: false
        type: boolean

env:
  NPM_TAG: ${{ inputs.tag || 'latest' }}
  DRY_RUN: ${{ inputs.dry-run == true && '--dry-run' || '' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all packages and apps
        run: bun run build

      - name: Sync versions from root package.json
        run: bun scripts/version-sync.ts

      - name: Resolve workspace dependencies
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Resolving workspace:* → ^$VERSION"

          for pkg in packages/core/package.json apps/*/package.json; do
            if grep -q '"workspace:\*"' "$pkg"; then
              sed -i "s|\"workspace:\*\"|\"^$VERSION\"|g" "$pkg"
              echo "  ✓ Resolved in $pkg"
            fi
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            packages/shared/dist
            packages/shared/package.json
            packages/core/dist
            packages/core/prisma
            packages/core/package.json
            apps/pi-thoth/dist
            apps/pi-thoth/package.json
          retention-days: 1
  publish:
    needs: [build]
    runs-on: ubuntu-latest
    environment: DEPLOY
    if: >-
      github.event_name == 'release' || inputs.target == 'all'
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Publish pi-thoth (unscoped)
        working-directory: apps/pi-thoth
        run: bun publish --access public --tag ${{ env.NPM_TAG }} --tolerate-republish ${{ env.DRY_RUN }}
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
